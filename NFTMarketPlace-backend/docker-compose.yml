
services:
  # MySQL 服务
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: admin_123
      MYSQL_DATABASE: nft_marketplace
      MYSQL_USER: nftuser
      MYSQL_PASSWORD: nftpwd_123
    ports:
      - 13306:3306
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - local

  # Redis 服务
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - 16379:6379
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - local

networks:
  local:
    driver: bridge

volumes:
  mysql_data:
  redis_data: